name: ClipCrop
options:
  bundleIdPrefix: com.klab
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
targets:
  ClipCrop:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: ClipCrop
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
        LSMinimumSystemVersion: "15.0"
    settings:
      base:
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
